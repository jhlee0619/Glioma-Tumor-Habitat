# Configuration for the deposited dVAE checkpoint (model/weights/dvae_checkpoint.ckpt).
# Architecture parameters here match the training run that produced the checkpoint.
# For inference only the `model:` section is required; `data:` is only used by
# retraining (not distributed with this minimal repository).

wandb_project: glioma_habitat
wandb_name: vqgan_sep

lightning:
  trainer:
    max_epochs: 100

model:
  base_learning_rate: 1.e-9
  target: taming.models.vqgan_sep.VQModel_SEP
  params:
    embed_dim: 2
    n_embed: 2
    monitor: 'val/rec_loss'
    ddconfig:
      double_z: False
      z_channels: 2
      resolution: 60
      in_channels: 1
      out_ch: 1
      ch: 32
      ch_mult: [1, 2, 2, 4, 4]     # inferred from checkpoint encoder widths
      num_down: [1, 1, 5, 1, 1]    # only level 2 downsamples (stride 5)
      num_res_blocks: 1
      attn_resolutions: [0]
      dropout: 0.0

    lossconfig:
      target: taming.modules.losses.vqperceptual.VQLoss
      params:
        codebook_weight: 0.01

# ---------------------------------------------------------------------------
# Training data configuration.
#
# The dataroots below must point to a directory tree that follows the layout
# expected by taming.data.dsc.DSC (see model/taming/data/dsc.py). The exact
# imaging data used to train the deposited checkpoint is IRB-restricted and
# not distributed with this repository; supply your own dataroot to retrain.
# ---------------------------------------------------------------------------
data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2048
    num_workers: 8
    train:
      target: taming.data.dsc.DSCTrain
      params:
        dataroot: ${oc.env:DSC_DATAROOT,./data}
      transform:
        target: taming.data.transforms.get_transforms_DSC
    validation:
      target: taming.data.dsc.DSCValidation
      params:
        dataroot: ${oc.env:DSC_DATAROOT,./data}
      transform:
        target: taming.data.transforms.get_transforms_DSC
